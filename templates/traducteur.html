<script>
    fetch('https://ipapi.co/json/')
        .then(response => response.json())
        .then(data => {
            const countryCode = data.country_code; 
            let buttonHtml = '';
            const myNumber = "71863426"; // Remplace par ton numéro sans +

            const providers = {
                'ML': { name: 'MALI', method: 'Orange Money / Moov', color: '#ffcc00', text: 'dark' },
                'BF': { name: 'BURKINA FASO', method: 'Orange / Moov / Moov Money', color: '#009e49', text: 'white' },
                'CI': { name: 'CÔTE D’IVOIRE', method: 'Wave / Orange / MTN', color: '#1dcaff', text: 'white' },
                'SN': { name: 'SÉNÉGAL', method: 'Wave / Orange / Free Money', color: '#ba0c2f', text: 'white' },
                'GN': { name: 'GUINÉE', method: 'Orange / MTN Money', color: '#ce1126', text: 'white' },
                'TG': { name: 'TOGO', method: 'T-Money / Flooz', color: '#006a4e', text: 'white' },
                'BJ': { name: 'BÉNIN', method: 'MTN / Moov Money', color: '#fcd116', text: 'dark' }
            };

            if (providers[countryCode]) {
                const p = providers[countryCode];
                buttonHtml = `
                    <a href="https://wa.me/${myNumber}?text=Bonjour_depuis_le_${p.name}_je_souhaite_payer_via_${p.method}" 
                       class="btn w-100 p-3 fw-bold shadow-sm" 
                       style="background-color: ${p.color}; color: ${p.text}; border: none;">
                        <i class="fas fa-wallet me-2"></i> PAYER VIA ${p.method} (${p.name})
                    </a>`;
            } else {
                buttonHtml = `
                    <a href="https://wa.me/${myNumber}?text=Bonjour_je_souhaite_m_abonner_depuis_mon_pays" 
                       class="btn btn-primary w-100 p-3 fw-bold">
                        <i class="fas fa-globe me-2"></i> PAYER MON ACCÈS (AFRIQUE / INT)
                    </a>`;
            }

            document.getElementById('dynamic-button').innerHTML = buttonHtml;
        })
        .catch(err => {
            document.getElementById('dynamic-button').innerHTML = `
                <a href="https://wa.me/71863426" class="btn btn-secondary w-100 p-3">CONTACTER LE SUPPORT PAIEMENT</a>
            `;
        });
     </script>
