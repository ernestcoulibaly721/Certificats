<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAK AUTO-IMMO | Accès Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --bg: #f4f7fe; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; color: #1e293b; }
        
        #paywall { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        
        .premium-card { 
            background: white; border-radius: 24px; padding: 40px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05);
            max-width: 400px; width: 90%; text-align: center;
        }

        .main-content { padding-top: 50px; }
        .glass-card { background: white; border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-pay { border-radius: 12px; padding: 15px; font-weight: 700; border: none; transition: 0.3s; text-decoration: none; display: block; text-align: center; }
        .btn-pay:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        
        .img-preview { width: 110px; height: 160px; object-fit: cover; border-radius: 12px; margin-right: 10px; }
        .overflow-auto::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="paywall">
        <div class="premium-card">
            <div class="mb-4">
                <i class="fas fa-crown text-warning fa-3x mb-3"></i>
                <h3 class="fw-bold">Activation Premium</h3>
                <p class="text-muted small">Débloquez vos outils IA et votre espace Cinéma en un clic.</p>
            </div>

            <div id="dynamic-button" class="mb-4">
                <div class="spinner-border text-primary spinner-border-sm"></div>
            </div>

            <div class="pt-3 border-top">
                <p class="small text-uppercase fw-bold text-muted mb-2">Déjà membre ?</p>
                <input type="password" id="accessCode" class="form-control form-control-lg text-center mb-3" placeholder="Entrez votre code" style="border-radius: 12px; background: #f8fafc;">
                <button onclick="checkCode()" class="btn btn-dark w-100 p-3 fw-bold" style="border-radius: 12px;">VALIDER L'ACCÈS</button>
            </div>
        </div>
    </div>

    <div class="container main-content">
        <div class="text-center mb-5">
            <h2 class="fw-bold text-dark">YAK AUTO-IMMO</h2>
            <p class="text-primary fw-bold">Solutions Numériques & Divertissement</p>
        </div>

        <div class="row justify-content-center text-center">
            <div class="col-md-8 glass-card p-4 mb-4">
                <div class="d-flex align-items-center mb-3">
                    <div class="p-3 bg-primary bg-opacity-10 rounded-3 me-3"><i class="fas fa-robot text-primary"></i></div>
                    <h5 class="mb-0 fw-bold">Traduction Vidéo IA</h5>
                </div>
                <div class="p-5 bg-light rounded-4 border-dashed border-2">
                    <p class="text-muted">Le module de traduction est prêt.</p>
                </div>
            </div>

            <div class="col-md-8 glass-card p-4 mb-5">
                <div class="d-flex align-items-center mb-4">
                    <div class="p-3 bg-warning bg-opacity-10 rounded-3 me-3"><i class="fas fa-film text-warning"></i></div>
                    <h5 class="mb-0 fw-bold">MovieBox Pro HD</h5>
                </div>

                <div class="d-flex overflow-auto pb-3 mb-4">
                    <img src="https://image.tmdb.org/t/p/w500/1g0dhYtWySSTZzhU6vui09zU6qC.jpg" class="img-preview shadow-sm border">
                    <img src="https://image.tmdb.org/t/p/w500/74xTEgt7R36Fpooo50r9T25onDB.jpg" class="img-preview shadow-sm border">
                    <img src="https://image.tmdb.org/t/p/w500/d5N0ZobjZSTzPzfsIuBabpDznH7.jpg" class="img-preview shadow-sm border">
                </div>

                <a href="https://www.mediafire.com/file/jlr6fyuo1oi7xpv/MovieBox.apk/file" target="_blank" class="btn btn-primary btn-pay w-100 shadow-sm text-white">
                    <i class="fas fa-download me-2"></i> TÉLÉCHARGER L'APPLICATION
                </a>
            </div>
        </div>
    </div>

    <script>
        const myNumber = "22671863426";

        fetch('https://ipapi.co/json/')
            .then(response => response.json())
            .then(data => {
                const countryCode = data.country_code || 'BF';
                const providers = {
                    'ML': { name: 'Mali', method: 'Orange / Moov', color: '#ffcc00', text: 'dark' },
                    'BF': { name: 'Burkina Faso', method: 'Orange / Moov', color: '#00c853', text: 'white' },
                    'CI': { name: 'Côte d’Ivoire', method: 'Wave / Orange', color: '#00b0ff', text: 'white' }
                };
                const p = providers[countryCode] || { name: 'Afrique', method: 'Mobile Money', color: '#0f172a', text: 'white' };

                document.getElementById('dynamic-button').innerHTML = `
                    <p class="small mb-2">Tarif local : <b>1.000 FCFA</b></p>
                    <a href="https://wa.me/${myNumber}?text=Paiement_Premium_${p.name}" 
                       class="btn btn-pay w-100 shadow-sm" style="background: ${p.color}; color: ${p.text};">
                       S'ABONNER VIA ${p.method.toUpperCase()}
                    </a>`;
            });

        function checkCode() {
            const val = document.getElementById('accessCode').value;
            if (val === 'MALI2026') {
                document.getElementById('paywall').style.display = 'none';
                localStorage.setItem('yak_premium', 'true');
            } else {
                alert('Code incorrect.');
            }
        }

        if(localStorage.getItem('yak_premium') === 'true') {
            document.getElementById('paywall').style.display = 'none';
        }
    </script>
</body>
</html>
