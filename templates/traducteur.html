<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESNER ENTREPRISE 🖥️| Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-card { background: #1e293b; border-radius: 20px; border: 1px solid #334155; }
        .btn-premium { border-radius: 12px; transition: all 0.3s; }
        #paywall { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div id="paywall">
        <div class="text-center p-4 main-card" style="max-width: 400px; margin: 20px;">
            <div class="mb-3"><i class="fas fa-lock text-warning fa-3x"></i></div>
            <h2 class="fw-bold mb-3">Accès Premium</h2>
            <p class="text-slate-300 small mb-4">Débloquez le traducteur IA et téléchargez MovieBox Pro HD immédiatement.</p>
            
            <div id="dynamic-button">
                <p class="small">Détection de votre région...</p>
            </div>

            <div class="mt-4">
                <input type="password" id="accessCode" class="form-control bg-dark text-white border-secondary text-center mb-2" placeholder="Entrez votre code reçu">
                <button onclick="checkCode()" class="btn btn-outline-info btn-sm w-100">VALIDER LE CODE</button>
            </div>
        </div>
    </div>

    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold text-info">YAK AUTO-IMMO</h1>
            <p>Traducteur Vidéo IA & Cinéma</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8 main-card p-4">
                <h5 class="mb-3"><i class="fas fa-magic me-2"></i>Traducteur de Vidéo</h5>
                <div class="bg-dark p-5 rounded text-center border border-dashed border-secondary">
                    <p class="text-muted">Le traducteur est prêt. Entrez votre code pour l'utiliser.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const myNumber = "22671863426";

        // 1. Gérer le bouton de paiement selon le pays
        fetch('https://ipapi.co/json/')
            .then(response => response.json())
            .then(data => {
                const countryCode = data.country_code || 'BF';
                const providers = {
                    'ML': { name: 'MALI', method: 'Orange / Moov', color: '#ffcc00', text: 'dark', price: '1.000 FCFA' },
                    'BF': { name: 'BURKINA FASO', method: 'Orange / Moov', color: '#009e49', text: 'white', price: '1.000 FCFA' },
                    'CI': { name: 'CÔTE D’IVOIRE', method: 'Wave / Orange', color: '#1dcaff', text: 'white', price: '1.000 FCFA' },
                    'SN': { name: 'SÉNÉGAL', method: 'Wave / Orange', color: '#ba0c2f', text: 'white', price: '1.000 FCFA' }
                };
                const p = providers[countryCode] || { name: 'AFRIQUE', method: 'Mobile Money', color: '#3b82f6', text: 'white', price: '1.000 FCFA' };

                document.getElementById('dynamic-button').innerHTML = `
                    <div class="badge bg-light text-dark mb-2">Prix : ${p.price}</div>
                    <a href="https://wa.me/${myNumber}?text=Bonjour_je_veux_payer_mon_acces_Premium_depuis_le_${p.name}" 
                       class="btn w-100 p-3 fw-bold" style="background-color:${p.color}; color:${p.text}; border-radius:12px;">
                       <i class="fas fa-wallet me-2"></i> PAYER VIA ${p.method}
                    </a>`;
            });

        // 2. Vérifier le code secret
        function checkCode() {
            const code = document.getElementById('accessCode').value;
            if (code === 'MALI2026') {
                document.getElementById('paywall').style.display = 'none';
                localStorage.setItem('yak_premium', 'true');
            } else {
                alert('Code incorrect !');
            }
        }

        // Garder débloqué si déjà payé
        if(localStorage.getItem('yak_premium') === 'true') {
            document.getElementById('paywall').style.display = 'none';
        }
    </script>
</body>
    </html>
